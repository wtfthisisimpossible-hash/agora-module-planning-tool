// ==========================================
// 插座組：同步註記 & 子列（任務三、五實作）
// ==========================================
const SOCKET_NOTE_TAG = '加購插座組';
const SOCKET_NOTE_SEPARATOR = '\n[加購插座組]';

/**
 * 根據 mod.socketQty 自動在 mod.note 附加或移除「加購插座組」標記。
 * 規則：
 *  - socketQty > 0 → 若 note 尾端尚未有標記，附加 SOCKET_NOTE_SEPARATOR
 *  - socketQty = 0 → 移除 SOCKET_NOTE_SEPARATOR（若存在），還原原始內容
 * 不覆蓋使用者手寫的其他備註內容。
 * 最後同步更新表格中對應 textarea 的顯示值。
 */
function syncSocketNote(uid) {
  const mod = modules.find(m => m.uid === uid);
  if (!mod || mod.id === 'SP-17-RPS' || mod.id === 'SP-17-ST') return;

  const hasTag = mod.note.includes(SOCKET_NOTE_SEPARATOR);

  if (mod.socketQty > 0) {
    // 需要標記，且尚未存在 → 附加
    if (!hasTag) {
      mod.note = mod.note + SOCKET_NOTE_SEPARATOR;
    }
  } else {
    // 需要移除標記
    if (hasTag) {
      mod.note = mod.note.split(SOCKET_NOTE_SEPARATOR).join('');
    }
  }

  // 同步更新表格中的 textarea 顯示
  const textarea = document.getElementById(`note-textarea-${uid}`);
  if (textarea) {
    textarea.value = mod.note;
  }
}

/**
 * 在模塊列（row-{uid}）下方插入、更新或移除「加購插座組」子列。
 * - socketQty > 0 且非圓凳 → 插入/更新子列
 * - socketQty = 0 或圓凳   → 移除子列（若存在）
 * 僅在明細模式（!isAggregated）下操作。
 */
function renderSocketSubRow(uid) {
  const SUBROW_ID = `socket-subrow-${uid}`;
  const existingSubRow = document.getElementById(SUBROW_ID);

  // 彙整模式：不顯示子列
  if (isAggregated) {
    if (existingSubRow) existingSubRow.remove();
    return;
  }

  const mod = modules.find(m => m.uid === uid);
  if (!mod || mod.id === 'SP-17-RPS' || mod.id === 'SP-17-ST' || mod.socketQty <= 0) {
    if (existingSubRow) existingSubRow.remove();
    return;
  }

  // 建立或更新子列
  const parentRow = document.getElementById(`row-${uid}`);
  if (!parentRow) return;

  if (existingSubRow) {
    // 更新數量欄
    const qtyCell = existingSubRow.querySelector('.socket-subrow-qty');
    if (qtyCell) qtyCell.textContent = mod.socketQty;
  } else {
    // 新建子列
    const subTr = document.createElement('tr');
    subTr.id = SUBROW_ID;
    subTr.style.background = '#fffbea';

    // 名稱欄
    const tdName = document.createElement('td');
    tdName.textContent = '加購插座組';
    tdName.style.paddingLeft = '20px';
    tdName.style.color = '#b8860b';
    tdName.style.fontSize = '11px';

    // 型號欄
    const tdId = document.createElement('td');
    tdId.textContent = 'SP-17-A01';
    tdId.style.fontWeight = 'bold';
    tdId.style.color = '#b8860b';
    tdId.style.fontSize = '11px';

    // 規格欄（空白）
    const tdSpec = document.createElement('td');
    tdSpec.textContent = '';

    // 數量欄
    const tdQty = document.createElement('td');
    tdQty.className = 'socket-subrow-qty';
    tdQty.style.textAlign = 'center';
    tdQty.style.fontWeight = 'bold';
    tdQty.style.color = '#b8860b';
    tdQty.textContent = mod.socketQty;

    // 其餘欄（椅背、坐墊、加購插座組input、註記）空白
    const tdEmpty1 = document.createElement('td');
    const tdEmpty2 = document.createElement('td');
    const tdEmpty3 = document.createElement('td');
    const tdEmpty4 = document.createElement('td');

    subTr.appendChild(tdName);
    subTr.appendChild(tdId);
    subTr.appendChild(tdSpec);
    subTr.appendChild(tdQty);
    subTr.appendChild(tdEmpty1);
    subTr.appendChild(tdEmpty2);
    subTr.appendChild(tdEmpty3);
    subTr.appendChild(tdEmpty4);

    // 插入在父列之後
    parentRow.insertAdjacentElement('afterend', subTr);
  }
}

// ==========================================
// 儲存 / 載入專案
// ==========================================
function saveProject() {
  if (modules.length === 0) {
    showToast("畫布空白，無可儲存的內容");
    return;
  }

  const projectData = {
    version: 1,
    savedAt: new Date().toISOString(),
    modules: modules.map(mod => ({
      uid:        mod.uid,
      id:         mod.id,
      name:       mod.name,
      width:      mod.width,
      height:     mod.height,
      spec:       mod.spec,
      x:          mod.x,
      y:          mod.y,
      rotate:     mod.rotate,
      seatColor:  mod.seatColor,
      backColor:  mod.backColor,
      seatLabel:  mod.seatLabel,
      backLabel:  mod.backLabel,
      note:       mod.note,
      socketQty:  mod.socketQty || 0,
      isCustom:   mod.isCustom || false
    }))
  };

  const json = JSON.stringify(projectData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const rawName = prompt("請輸入專案名稱：");
  if (rawName === null) return; // 按取消則中止
  const projectName = rawName.trim().replace(/[\\/:*?"<>|]/g, '_') || 'Untitled';

  const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
  const a = document.createElement('a');
  a.href = url;
  a.download = `AGORA_${projectName}_${ts}.agora`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("專案已儲存");
}

function loadProject(event) {
  const file = event.target.files[0];
  if (!file) return;

  // 重置 input，讓同一個檔案也能再次觸發
  event.target.value = '';

  const reader = new FileReader();
  reader.onload = (e) => {
    let data;
    try {
      data = JSON.parse(e.target.result);
    } catch {
      alert("檔案格式錯誤，請選擇有效的 .agora 專案檔。");
      return;
    }

    if (!data.version || !Array.isArray(data.modules)) {
      alert("檔案格式不符，無法載入。");
      return;
    }

    const proceed = modules.length === 0 ||
      confirm("載入新專案將覆蓋目前畫布上的所有配置，確定繼續？");
    if (!proceed) return;

    // 清空現有畫布
    modules.forEach(mod => {
      const div = document.getElementById(`mod-${mod.uid}`);
      if (div) div.remove();
    });
    modules = [];
    selectedUid = null;
    clearMultiSelection();

    // 載入模塊
    data.modules.forEach(saved => {
      // 訂製模塊：重建 SVG 並存入快取
      if (saved.isCustom && saved.id && saved.id.startsWith('CUSTOM-STRAIGHT-')) {
        if (!CUSTOM_SVG[saved.id]) {
          const parts   = saved.id.split('-'); // ['CUSTOM','STRAIGHT', widthMm, backType]
          const wMm     = parseInt(parts[2]) || 1000;
          const bType   = parts[3] || 'SBS';
          CUSTOM_SVG[saved.id] = buildCustomStraightSVG(wMm, bType);
        }
      }
      // 以 uid 為準保留原始識別碼（避免拖曳衝突）
      const mod = {
        uid:       saved.uid,
        id:        saved.id,
        name:      saved.name,
        width:     saved.width,
        height:    saved.height,
        spec:      saved.spec || '',
        x:         saved.x,
        y:         saved.y,
        rotate:    saved.rotate || 0,
        seatColor: saved.seatColor || DEFAULT_SEAT_COLOR,
        backColor: saved.backColor ?? DEFAULT_BACK_COLOR,
        seatLabel: saved.seatLabel || '',
        backLabel: saved.backLabel || '',
        note:      saved.note || '',
        socketQty: (saved.id === 'SP-17-RPS' || saved.id === 'SP-17-ST') ? 0 : (saved.socketQty || 0),
        isCustom:  saved.isCustom || false
      };
      modules.push(mod);
      renderModuleDOM(mod);
      // 確保載入的資料 note 與 socketQty 狀態一致
      syncSocketNote(mod.uid);
    });

    renderTable();
    updateEmptyHint();
    showToast(`已載入專案（${modules.length} 個模塊）`);
  };
  reader.readAsText(file);
}

function exportCSV() {
  if (modules.length === 0) {
    showToast("清單目前沒有任何項目");
    return;
  }

  let csvContent = "\uFEFF";
  csvContent += "模塊名稱,型號,規格(mm),數量,椅背布號,坐墊布號,註記\n";

  const escCSV = (s) => `"${(s || '').replace(/"/g, '""')}"`;

  if (isAggregated) {
    const rows = buildAggregatedRows();
    rows.forEach(g => {
      const backLbl = g.backColor ? (g.backLabel || '') : '';
      const seatLbl = g.seatLabel || '';
      csvContent += `${escCSV(g.name)},${escCSV(g.id)},${escCSV(g.spec)},${escCSV(String(g.qty))},${escCSV(backLbl)},${escCSV(seatLbl)},${escCSV(g.note)}\n`;
    });
    // 加購插座組獨立品項
    const totalSocketQty = modules.reduce((sum, m) => sum + (m.socketQty || 0), 0);
    if (totalSocketQty > 0) {
      csvContent += `${escCSV('加購插座組')},${escCSV('SP-17-A01')},"","${totalSocketQty}","","",""\n`;
    }
  } else {
    modules.forEach(mod => {
      const backLbl  = mod.backColor ? (mod.backLabel  || '') : '';
      const seatLbl  = mod.seatLabel || '';
      csvContent += `${escCSV(mod.name)},${escCSV(mod.isCustom ? '' : (mod.id === 'SP-17-ST' ? '' : mod.id))},${escCSV(mod.spec || `${mod.width}*${mod.height}`)},${escCSV('1')},${escCSV(backLbl)},${escCSV(seatLbl)},${escCSV(mod.note)}\n`;
    });
  }

  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", `AGORA_Sofa_Layout_${Date.now()}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast("CSV 清單匯出成功");
}

// ==========================================
// 7. 精確不失真：原生 2D Canvas 配置擷圖邏輯
// ==========================================
function captureCanvas() {
  if (modules.length === 0) {
    showToast("畫布空白，無法截圖");
    return;
  }

  showToast("正在生成高解析度平面圖...");

  const PADDING = 200; // 向外擴展 200 邏輯像素
  const DPR = 2;       // 2 倍解析度輸出

  // 1. 計算所有模塊旋轉後的實際邊界框
  //    對每個模塊取 4 個角點做旋轉，求整體最大外框
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

  modules.forEach(mod => {
    const wPx = mod.width * SCALE;
    const hPx = mod.height * SCALE;
    const cx = mod.x + wPx / 2;
    const cy = mod.y + hPx / 2;
    const rad = (mod.rotate * Math.PI) / 180;
    const cos = Math.cos(rad), sin = Math.sin(rad);

    // 4 個角點（相對中心）
    [[-wPx/2, -hPx/2], [wPx/2, -hPx/2], [wPx/2, hPx/2], [-wPx/2, hPx/2]].forEach(([lx, ly]) => {
      const wx = cx + lx * cos - ly * sin;
      const wy = cy + lx * sin + ly * cos;
      if (wx < minX) minX = wx;
      if (wx > maxX) maxX = wx;
      if (wy < minY) minY = wy;
      if (wy > maxY) maxY = wy;
    });
  });

  // 2. 加上 padding，得到擷圖範圍（邏輯像素）
  const cropX = minX - PADDING;
  const cropY = minY - PADDING;
  const cropW = (maxX - minX) + PADDING * 2;
  const cropH = (maxY - minY) + PADDING * 2;

  // 3. 建立高解析度 Canvas
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width  = Math.ceil(cropW * DPR);
  exportCanvas.height = Math.ceil(cropH * DPR);
  const ctx = exportCanvas.getContext('2d');
  ctx.scale(DPR, DPR);

  // 4. 填滿背景色
  ctx.fillStyle = '#fcfcfc';
  ctx.fillRect(0, 0, cropW, cropH);

  // 5. 繪製網格（對齊世界座標網格，平移至擷圖原點）
  const step1000 = 100;
  const step200  = 20;

  // 計算網格起始點（對齊世界座標的 20px 格線）
  const gridStartX = Math.floor(cropX / step200) * step200;
  const gridStartY = Math.floor(cropY / step200) * step200;

  ctx.fillStyle = '#ccc';
  for (let wx = gridStartX; wx <= cropX + cropW; wx += step200) {
    for (let wy = gridStartY; wy <= cropY + cropH; wy += step200) {
      ctx.beginPath();
      ctx.arc(wx - cropX, wy - cropY, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const gridStart1000X = Math.floor(cropX / step1000) * step1000;
  const gridStart1000Y = Math.floor(cropY / step1000) * step1000;

  ctx.fillStyle = '#5d5d5d';
  for (let wx = gridStart1000X; wx <= cropX + cropW; wx += step1000) {
    for (let wy = gridStart1000Y; wy <= cropY + cropH; wy += step1000) {
      ctx.beginPath();
      ctx.arc(wx - cropX, wy - cropY, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 6. 依序繪製所有模塊（座標平移至擷圖原點）
  let loadedImagesCount = 0;

  modules.forEach(mod => {
    const img = new Image();
    img.src = getModuleImageUrl(mod.id, mod.seatColor, mod.backColor);

    img.onload = () => {
      ctx.save();

      const wPx = mod.width * SCALE;
      const hPx = mod.height * SCALE;
      // 模塊中心點平移至擷圖座標系
      const centerX = (mod.x + wPx / 2) - cropX;
      const centerY = (mod.y + hPx / 2) - cropY;

      ctx.translate(centerX, centerY);
      ctx.rotate((mod.rotate * Math.PI) / 180);
      ctx.drawImage(img, -wPx / 2, -hPx / 2, wPx, hPx);

      ctx.restore();

      loadedImagesCount++;
      if (loadedImagesCount === modules.length) {
        finalizeDownload();
      }
    };

    img.onerror = () => {
      loadedImagesCount++;
      if (loadedImagesCount === modules.length) {
        finalizeDownload();
      }
    };
  });

  function finalizeDownload() {
    exportCanvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = `AGORA_Sofa_Design_${Date.now()}.png`;
      link.href = url;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 10000);
      showToast("平面圖下載完成");
    }, 'image/png');
  }
}
// ==========================================
// 複製選取模塊（Ctrl+D）
// ==========================================
function duplicateSelected() {
  // 收集目前選取的所有模塊（單選 + 多選）
  const targetUids = new Set();
  if (selectedUid !== null) targetUids.add(selectedUid);
  selectedUids.forEach(uid => targetUids.add(uid));

  if (targetUids.size === 0) {
    showToast('請先選取要複製的模塊');
    return;
  }

  const targets = [...targetUids].map(uid => modules.find(m => m.uid === uid)).filter(Boolean);

  // 計算被選取群組的 bounding box
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  targets.forEach(mod => {
    const wPx = mod.width * SCALE;
    const hPx = mod.height * SCALE;
    if (mod.x < minX) minX = mod.x;
    if (mod.y < minY) minY = mod.y;
    if (mod.x + wPx > maxX) maxX = mod.x + wPx;
    if (mod.y + hPx > maxY) maxY = mod.y + hPx;
  });

  // 用 findInsertPosition 取得群組插入中心點（確保落在畫布可見區域）
  const groupW = maxX - minX;
  const groupH = maxY - minY;
  const { cx: insertCx, cy: insertCy } = findInsertPosition(groupW, groupH);

  // 群組原中心 → 計算偏移量
  const origCx = minX + groupW / 2;
  const origCy = minY + groupH / 2;
  const offsetX = insertCx - origCx;
  const offsetY = insertCy - origCy;

  // 先清除目前選取狀態
  if (selectedUid !== null) {
    const prevDiv = document.getElementById(`mod-${selectedUid}`);
    if (prevDiv) prevDiv.classList.remove('selected');
    const prevRow = document.getElementById(`row-${selectedUid}`);
    if (prevRow) prevRow.style.background = '';
    selectedUid = null;
  }
  selectedUids.forEach(uid => {
    const div = document.getElementById(`mod-${uid}`);
    if (div) { div.classList.remove('selected'); div.classList.remove('multi-selected'); }
    const row = document.getElementById(`row-${uid}`);
    if (row) { row.style.background = ''; row.classList.remove('multi-selected-row'); }
  });
  selectedUids.clear();

  // 建立副本
  const newUids = [];
  const baseTime = Date.now();
  targets.forEach((mod, i) => {
    const newUid = baseTime + i * 7 + Math.floor(Math.random() * 100);
    const copy = {
      uid:       newUid,
      id:        mod.id,
      name:      mod.name,
      width:     mod.width,
      height:    mod.height,
      spec:      mod.spec,
      x:         mod.x + offsetX,
      y:         mod.y + offsetY,
      rotate:    mod.rotate,
      note:      mod.note,
      seatColor: mod.seatColor,
      backColor: mod.backColor,
      backLabel: mod.backLabel,
      seatLabel: mod.seatLabel,
      socketQty: (mod.id === 'SP-17-RPS' || mod.id === 'SP-17-ST') ? 0 : (mod.socketQty || 0)
    };
    modules.push(copy);
    renderModuleDOM(copy);
    newUids.push(newUid);
  });

  // 選取所有新副本（群組選取）
  if (newUids.length === 1) {
    selectModule(newUids[0]);
  } else {
    newUids.forEach(uid => {
      selectedUids.add(uid);
      const div = document.getElementById(`mod-${uid}`);
      if (div) div.classList.add('multi-selected');
    });
  }

  renderTable();
  updateEmptyHint();
  showToast(`已複製 ${targets.length} 個模塊`);
}

// ==========================================
// 訂製直型模塊
// ==========================================

/**
 * 根據寬度與椅背款式，動態產生由左、中、右三段組成的 SVG 字串。
 *
 * 座標系：與原始模塊完全一致。
 *   原始 1T 模塊：width=700mm，SVG viewBox 高度 = 413.386pt
 *   換算比例：PT_PER_MM = 413.386 / 700 ≈ 0.59055 pt/mm
 *
 * 左段 & 右段各固定對應 70mm（≈ 41.34pt），保留圓角與腳位；
 * 中段對應 (widthMm - 140)mm，兩側直切、可橫向無限拉伸。
 * 所有路徑全部在同一個 SVG 座標空間繪製，不使用巢狀 SVG。
 */
function buildCustomStraightSVG(widthMm, backType) {
  // ── 座標換算常數（來自原始 1T 模塊：viewBox=413.386, width=700mm）──
  const PT_PER_MM = 413.386 / 700;   // ≈ 0.59055 pt/mm
  const mm = v => v * PT_PER_MM;     // mm → pt

  // ── 總 viewBox 尺寸（pt）──
  const VW = mm(widthMm);            // 總寬（pt）
  const VH = 413.386;                // 固定高（pt），與原始模塊一致

  // ── 原始模塊的各項固定值（直接取自 1TSBS / 1TRBS SVG）──
  const R       = 17.717;            // 圓角半徑（pt）
  const STROKE  = 4.167;             // 外框內縮（pt）
  const LEG_W   = 11.811;            // 腳位寬（pt）
  const LEG_H   = 47.244;            // 腳位高（pt）
  const LEG_Y1  = 64.961;            // 上腳位 Y（pt）
  const LEG_Y2  = 301.181;           // 下腳位 Y（pt）
  const BACK_H  = 100.394;           // 椅背高 / 扶手寬（pt）

  // ── 椅背/扶手相關座標 ──
  const BACK_TOP       = R;                     // 17.717  椅背頂部 Y
  const BACK_BOT       = R + BACK_H;            // 118.111 椅背底部 Y
  const BACK_BOT_INNER = R + BACK_H - STROKE;   // 113.944 椅背內框底部 Y

  // ── 扶手右邊界（RBS）：來自 1TRBS 路徑分析
  // 全寬往下椅背後，l-295.276,0 → 右邊界 X = 413.386-295.276 = 118.111 = R+BACK_H
  const ARM_RIGHT       = R + BACK_H;           // 118.111 扶手填色右邊界 X
  const ARM_RIGHT_INNER = R + BACK_H - STROKE;  // 113.944 扶手內框右邊界 X

  const sf = DEFAULT_SEAT_COLOR;
  const bf = DEFAULT_BACK_COLOR;
  const sk = '#000000';

  const leg = (x, y) =>
    `<rect x="${x.toFixed(3)}" y="${y.toFixed(3)}" width="${LEG_W}" height="${LEG_H}" fill="${sk}"/>`;

  // ══════════════════════════════════════════
  // 坐墊本體（全款共用）
  // ══════════════════════════════════════════
  const seat = `<path d="M${R},0 L${(VW-R).toFixed(3)},0 Q${VW.toFixed(3)},0 ${VW.toFixed(3)},${R} L${VW.toFixed(3)},${(VH-R).toFixed(3)} Q${VW.toFixed(3)},${VH} ${(VW-R).toFixed(3)},${VH} L${R},${VH} Q0,${VH} 0,${(VH-R).toFixed(3)} L0,${R} Q0,0 ${R},0 Z" fill="${sf}"/>`;

  // ── 外框線（evenodd 鏤空，全款共用）──
  const outline = `<path d="M${R},0 L${(VW-R).toFixed(3)},0 Q${VW.toFixed(3)},0 ${VW.toFixed(3)},${R} L${VW.toFixed(3)},${(VH-R).toFixed(3)} Q${VW.toFixed(3)},${VH} ${(VW-R).toFixed(3)},${VH} L${R},${VH} Q0,${VH} 0,${(VH-R).toFixed(3)} L0,${R} Q0,0 ${R},0 Z M${R},${STROKE} Q${STROKE},${STROKE} ${STROKE},${R} L${STROKE},${(VH-R).toFixed(3)} Q${STROKE},${(VH-STROKE).toFixed(3)} ${R},${(VH-STROKE).toFixed(3)} L${(VW-R).toFixed(3)},${(VH-STROKE).toFixed(3)} Q${(VW-STROKE).toFixed(3)},${(VH-STROKE).toFixed(3)} ${(VW-STROKE).toFixed(3)},${(VH-R).toFixed(3)} L${(VW-STROKE).toFixed(3)},${R} Q${(VW-STROKE).toFixed(3)},${STROKE} ${(VW-R).toFixed(3)},${STROKE} Z" fill="${sk}" fill-rule="evenodd"/>`;

  let back = '';

  if (backType === 'SBS') {
    // ── SBS：全寬橫向椅背 ──
    back += `<path d="M${VW.toFixed(3)},${BACK_TOP} L${VW.toFixed(3)},${BACK_BOT} L0,${BACK_BOT} L0,${BACK_TOP} Q0,0 ${R},0 L${(VW-R).toFixed(3)},0 Q${VW.toFixed(3)},0 ${VW.toFixed(3)},${BACK_TOP} Z" fill="${bf}"/>`;
    back += `<path d="M${VW.toFixed(3)},${BACK_TOP} L${VW.toFixed(3)},${BACK_BOT} L0,${BACK_BOT} L0,${BACK_TOP} Q0,0 ${R},0 L${(VW-R).toFixed(3)},0 Q${VW.toFixed(3)},0 ${VW.toFixed(3)},${BACK_TOP} Z M${(VW-STROKE).toFixed(3)},${R} Q${(VW-STROKE).toFixed(3)},${STROKE} ${(VW-R).toFixed(3)},${STROKE} L${R},${STROKE} Q${STROKE},${STROKE} ${STROKE},${R} L${STROKE},${BACK_BOT_INNER} L${(VW-STROKE).toFixed(3)},${BACK_BOT_INNER} Z" fill="${sk}" fill-rule="evenodd"/>`;

  } else if (backType === 'RBS') {
    // ── RBS：左側垂直扶手 + 頂部椅背（完全對應 1TRBS 的灰色區域）──
    //
    // 灰色填色形狀（來自 1TRBS）：
    //   頂部橫跨全寬（Y: 0 → BACK_BOT）
    //   + 左側垂直扶手（X: 0 → ARM_RIGHT，Y: BACK_BOT → VH）
    //   整體為 L 形
    back += `<path d="M0,${(VH-R).toFixed(3)} Q0,${VH} ${R},${VH} L${ARM_RIGHT.toFixed(3)},${VH} L${ARM_RIGHT.toFixed(3)},${BACK_BOT} L${VW.toFixed(3)},${BACK_BOT} L${VW.toFixed(3)},${BACK_TOP} Q${VW.toFixed(3)},0 ${(VW-R).toFixed(3)},0 L${R},0 Q0,0 0,${R} Z" fill="${bf}"/>`;

    // 外框（evenodd）：
    //   外框同上面的 L 形填色；
    //   內框也是 L 形，各邊內縮 STROKE
    back += `<path d="M0,${(VH-R).toFixed(3)} Q0,${VH} ${R},${VH} L${ARM_RIGHT.toFixed(3)},${VH} L${ARM_RIGHT.toFixed(3)},${BACK_BOT} L${VW.toFixed(3)},${BACK_BOT} L${VW.toFixed(3)},${BACK_TOP} Q${VW.toFixed(3)},0 ${(VW-R).toFixed(3)},0 L${R},0 Q0,0 0,${R} Z M${STROKE},${R} Q${STROKE},${STROKE} ${R},${STROKE} L${(VW-R).toFixed(3)},${STROKE} Q${(VW-STROKE).toFixed(3)},${STROKE} ${(VW-STROKE).toFixed(3)},${R} L${(VW-STROKE).toFixed(3)},${BACK_BOT_INNER} L${ARM_RIGHT_INNER.toFixed(3)},${BACK_BOT_INNER} L${ARM_RIGHT_INNER.toFixed(3)},${(VH-R).toFixed(3)} Q${ARM_RIGHT_INNER.toFixed(3)},${(VH-STROKE).toFixed(3)} ${ARM_RIGHT.toFixed(3)},${(VH-STROKE).toFixed(3)} L${R},${(VH-STROKE).toFixed(3)} Q${STROKE},${(VH-STROKE).toFixed(3)} ${STROKE},${(VH-R).toFixed(3)} Z" fill="${sk}" fill-rule="evenodd"/>`;
  } else if (backType === 'LBS') {
    // ── LBS：右側垂直扶手 + 頂部椅背（RBS 鏡像，扶手在右）──
    // 扶手左邊界 X = VW - (R + BACK_H)
    const AL  = VW - ARM_RIGHT;        // 扶手填色左邊界 X
    const ALI = VW - ARM_RIGHT_INNER;  // 扶手內框左邊界 X
    back += `<path d="M${VW.toFixed(3)},${(VH-R).toFixed(3)} Q${VW.toFixed(3)},${VH} ${(VW-R).toFixed(3)},${VH} L${AL.toFixed(3)},${VH} L${AL.toFixed(3)},${BACK_BOT} L0,${BACK_BOT} L0,${BACK_TOP} Q0,0 ${R},0 L${(VW-R).toFixed(3)},0 Q${VW.toFixed(3)},0 ${VW.toFixed(3)},${BACK_TOP} Z" fill="${bf}"/>`;
    back += `<path d="M${VW.toFixed(3)},${(VH-R).toFixed(3)} Q${VW.toFixed(3)},${VH} ${(VW-R).toFixed(3)},${VH} L${AL.toFixed(3)},${VH} L${AL.toFixed(3)},${BACK_BOT} L0,${BACK_BOT} L0,${BACK_TOP} Q0,0 ${R},0 L${(VW-R).toFixed(3)},0 Q${VW.toFixed(3)},0 ${VW.toFixed(3)},${BACK_TOP} Z M${(VW-STROKE).toFixed(3)},${R} Q${(VW-STROKE).toFixed(3)},${STROKE} ${(VW-R).toFixed(3)},${STROKE} L${R},${STROKE} Q${STROKE},${STROKE} ${STROKE},${R} L${STROKE},${BACK_BOT_INNER} L${ALI.toFixed(3)},${BACK_BOT_INNER} L${ALI.toFixed(3)},${(VH-R).toFixed(3)} Q${ALI.toFixed(3)},${(VH-STROKE).toFixed(3)} ${AL.toFixed(3)},${(VH-STROKE).toFixed(3)} L${(VW-R).toFixed(3)},${(VH-STROKE).toFixed(3)} Q${(VW-STROKE).toFixed(3)},${(VH-STROKE).toFixed(3)} ${(VW-STROKE).toFixed(3)},${(VH-R).toFixed(3)} Z" fill="${sk}" fill-rule="evenodd"/>`;
  }
  // NBS：back 保持空字串

  // ── 腳位（左右各兩個）──
  const legs =
    leg(0, LEG_Y1) +
    leg(0, LEG_Y2) +
    leg(VW - LEG_W, LEG_Y1) +
    leg(VW - LEG_W, LEG_Y2);

  // ══════════════════════════════════════════
  // 組合最終 SVG（單一座標空間，無巢狀）
  // ══════════════════════════════════════════
  return `<svg width="100%" height="100%" viewBox="0 0 ${VW.toFixed(3)} ${VH}" xmlns="http://www.w3.org/2000/svg" style="fill-rule:evenodd;clip-rule:evenodd;">
  ${seat}
  ${outline}
  ${back}
  ${legs}
</svg>`;
}

/** 更新面板預覽圖 */
function updateCustomPreview() {
  const widthInput = document.getElementById('custom-width-input');

/** 產生訂製模塊的 Blob URL（供 img src 使用） */
function getCustomModuleBlobUrl(widthMm, backType, seatColor, backColor) {
  // 先取得原始 SVG（使用 DEFAULT 顏色）
  let svgString = buildCustomStraightSVG(widthMm, backType);

  // 套用顏色替換（與 getModuleImageUrl 相同機制）
  const sc = (seatColor || DEFAULT_SEAT_COLOR).toLowerCase();
  const bc = (backColor || DEFAULT_BACK_COLOR).toLowerCase();
  const SEAT_PLACEHOLDER = '__SEAT_COLOR__';
  const BACK_PLACEHOLDER = '__BACK_COLOR__';
  svgString = svgString.split(DEFAULT_SEAT_COLOR).join(SEAT_PLACEHOLDER);
  svgString = svgString.split(DEFAULT_BACK_COLOR).join(BACK_PLACEHOLDER);
  svgString = svgString.split(SEAT_PLACEHOLDER).join(sc);
  svgString = svgString.split(BACK_PLACEHOLDER).join(bc);

  const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
  return URL.createObjectURL(blob);
}

/** 插入訂製直型模塊到畫布 */
function insertCustomStraightModule() {
  const widthInput = document.getElementById('custom-width-input');
  const backType   = document.getElementById('custom-back-type').value;
  const widthMm    = Math.max(200, Math.min(9999, parseInt(widthInput.value) || 1000));
  const depthMm    = 700;

  // ── 若寬度符合既有規格尺寸，自動改為對應的標準模塊 ──
  // 鍵值：`${widthMm}-${backType}`，對應公版料號
  const STANDARD_WIDTH_MAP = {
    '700-RBS':  'SP-17-1TRBS',   // 單人有椅背右扶手
    '700-LBS':  'SP-17-1TLBS',   // 單人有椅背左扶手
    '700-SBS':  'SP-17-1TSBS',   // 單人直型椅背
    '700-NBS':  'SP-17-1TNBS',   // 單人無椅背
    '1400-RBS': 'SP-17-2TRBS',   // 雙人有椅背右扶手
    '1400-LBS': 'SP-17-2TLBS',   // 雙人有椅背左扶手
    '1400-SBS': 'SP-17-2TSBS',   // 雙人直型椅背
    '1400-NBS': 'SP-17-2TNBS',   // 雙人無椅背
  };
  const mapKey = `${widthMm}-${backType}`;
  if (STANDARD_WIDTH_MAP[mapKey]) {
    const targetId  = STANDARD_WIDTH_MAP[mapKey];
    const allModels = SOFA_MODELS['straight'] || [];
    const model     = allModels.find(m => m.id === targetId);
    if (model) {
      const wPx = model.width  * SCALE;
      const hPx = model.height * SCALE;
      const { cx, cy } = findInsertPosition(wPx, hPx);
      const uid = Date.now() + Math.floor(Math.random() * 1000);
      const svgMarkup = CUSTOM_SVG[model.id] || '';
      const hasBackColorBlock = svgMarkup.toLowerCase().includes(DEFAULT_BACK_COLOR);
      const newModule = {
        uid:       uid,
        id:        model.id,
        name:      model.name,
        width:     model.width,
        height:    model.height,
        spec:      model.spec,
        x:         cx - wPx / 2,
        y:         cy - hPx / 2,
        rotate:    0,
        note:      '',
        seatColor: DEFAULT_SEAT_COLOR,
        backColor: hasBackColorBlock ? DEFAULT_BACK_COLOR : '',
        backLabel: '',
        seatLabel: '',
        socketQty: 0
      };
      modules.push(newModule);
      renderModuleDOM(newModule);
      renderTable();
      selectModule(uid);
      updateEmptyHint();
      showToast(`寬度 ${widthMm}mm 符合規格，已自動插入${model.name}（${model.id}）`);
      return;
    }
  }
  // ── 以下為一般訂製模塊流程 ──

  const uid = Date.now() + Math.floor(Math.random() * 1000);
  const wPx = widthMm * SCALE;
  const hPx = depthMm * SCALE;
  const { cx, cy } = findInsertPosition(wPx, hPx);

  const hasSeatback = backType === 'SBS';
  const hasArmrest  = backType === 'RBS' || backType === 'LBS';
  const modelId   = `CUSTOM-STRAIGHT-${widthMm}-${backType}`;
  const modelName = backType === 'RBS' ? '訂製直型沙發有椅背右扶手'
                  : backType === 'LBS' ? '訂製直型沙發有椅背左扶手'
                  : hasSeatback ? '訂製直型沙發有椅背'
                  : '訂製直型沙發無椅背';

  // 將 SVG 存入 CUSTOM_SVG 快取（讓 getModuleImageUrl 可取得）
  CUSTOM_SVG[modelId] = buildCustomStraightSVG(widthMm, backType);

  const newModule = {
    uid:       uid,
    id:        modelId,
    name:      modelName,
    width:     widthMm,
    height:    depthMm,
    spec:      `${widthMm}*${depthMm}*${(hasSeatback || hasArmrest) ? 750 : 430}`,
    x:         cx - wPx / 2,
    y:         cy - hPx / 2,
    rotate:    0,
    note:      '',
    seatColor: DEFAULT_SEAT_COLOR,
    backColor: (hasSeatback || hasArmrest) ? DEFAULT_BACK_COLOR : '',
    backLabel: '',
    seatLabel: '',
    socketQty: 0,
    isCustom:  true
  };

  modules.push(newModule);
  renderModuleDOM(newModule);
  renderTable();
  selectModule(uid);
  updateEmptyHint();
  showToast(`已插入訂製直型模塊 ${widthMm}mm`);
}

// ─── 頁面載入後初始化訂製模塊面板 ───
document.addEventListener('DOMContentLoaded', () => {
  const widthInput  = document.getElementById('custom-width-input');
  const backSelect  = document.getElementById('custom-back-type');
  widthInput.addEventListener('input',  updateCustomPreview);
  backSelect.addEventListener('change', updateCustomPreview);
  updateCustomPreview(); // 初始預覽
});

// ==========================================
// 任務二：Panel 抽屜開關（小螢幕專用）
// ==========================================
function openPanelDrawer() {
  document.getElementById('panel').classList.add('panel-open');
  document.getElementById('panel-overlay').classList.add('overlay-show');
  document.body.style.overflow = 'hidden';
}

function closePanelDrawer() {
  document.getElementById('panel').classList.remove('panel-open');
  document.getElementById('panel-overlay').classList.remove('overlay-show');
  document.body.style.overflow = '';
}

// ==========================================
// 8. 輔助工具 (吐司訊息通知)
// ==========================================
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}
</script>
